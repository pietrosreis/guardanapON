<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GuardanapON</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="./css/stitch.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100dvh;
      display: grid;
      place-items: center;
      font-family: "Space Grotesk", sans-serif;
      background: #f0ece4;
      padding: 1.5rem;
    }

    /* ── Page shell ── */
    .page {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    /* ── Card ── */
    .card {
      background: #fff;
      position: relative;
      box-shadow:
        0 1px 2px rgba(0,0,0,0.04),
        0 4px 16px rgba(0,0,0,0.08),
        0 16px 40px rgba(0,0,0,0.06);
    }

    /* Yellow left accent bar */
    .card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 4px;
      background: #D8EF00;
    }

    /* ── Card header ── */
    .card-header {
      padding: 2rem 2rem 1.5rem 2.25rem;
      border-bottom: 1px solid #f0ece4;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
    }

    .logo-mark {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .logo-text {
      font-size: 1.625rem;
      font-weight: 900;
      letter-spacing: -0.05em;
      line-height: 1;
    }
    .logo-text .g { color: #0c3040; }
    .logo-text .on {
      color: #D8EF00;
      background: #0c3040;
      padding: 0 4px 1px;
      display: inline-block;
    }
    .logo-sub {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #9a958f;
      margin-top: 4px;
    }

    /* Corner decoration */
    .corner-dots {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4px;
      opacity: 0.25;
      margin-top: 2px;
    }
    .corner-dots span {
      font-size: 11px;
      font-weight: 300;
      color: #0c3040;
      line-height: 1;
      text-align: center;
    }

    /* ── Tabs ── */
    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      padding: 1.25rem 2rem 0 2.25rem;
      gap: 0;
    }
    .tab-btn {
      font-family: "Space Grotesk", sans-serif;
      font-size: 10px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      padding: 10px 0;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: #b0aba4;
      cursor: pointer;
      transition: all 0.15s;
      text-align: left;
    }
    .tab-btn.active {
      color: #0c3040;
      border-bottom-color: #D8EF00;
      background: transparent;
    }
    .tab-btn:not(.active):hover { color: #0c3040; background: transparent; }

    /* ── Form body ── */
    .card-body {
      padding: 1.5rem 2rem 2rem 2.25rem;
    }

    .auth-panel { display: none; }
    .auth-panel.active { display: block; }

    /* ── Fields ── */
    .field { margin-bottom: 1.25rem; }
    .field-label {
      display: block;
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: #6b6660;
      margin-bottom: 8px;
    }
    .field-input {
      display: block;
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1.5px solid #d4d0c8;
      padding: 6px 0 10px;
      font-family: "Space Grotesk", sans-serif;
      font-size: 15px;
      font-weight: 500;
      color: #1a1a1a;
      outline: none;
      transition: border-color 0.2s;
    }
    .field-input::placeholder { color: #c4c0b8; font-weight: 400; }
    .field-input:focus { border-color: #D8EF00; }
    .field-error {
      font-size: 10px;
      font-weight: 700;
      color: #b02500;
      min-height: 14px;
      margin-top: 4px;
    }
    .form-error {
      font-size: 11px;
      font-weight: 700;
      color: #b02500;
      min-height: 16px;
      margin-bottom: 8px;
    }

    /* ── CTA button ── */
    .btn-cta {
      display: block;
      width: 100%;
      padding: 14px;
      background: #D8EF00;
      color: #1a2e00;
      font-family: "Space Grotesk", sans-serif;
      font-size: 10px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      border: none;
      cursor: pointer;
      position: relative;
      transition: all 0.12s;
      margin-top: 6px;
    }
    .btn-cta::after {
      content: '';
      position: absolute;
      inset: 0;
      border: 1.5px solid #0c3040;
      transform: translate(3px, 3px);
      transition: transform 0.12s;
      pointer-events: none;
    }
    .btn-cta:hover { filter: brightness(1.05); }
    .btn-cta:active { transform: translate(2px, 2px); }
    .btn-cta:active::after { transform: translate(1px, 1px); }

    /* ── Secondary actions ── */
    .secondary {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 1.25rem;
      padding-top: 1rem;
      border-top: 1px solid #f0ece4;
    }
    .btn-link {
      font-family: "Space Grotesk", sans-serif;
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #9a958f;
      background: none;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 0;
      transition: color 0.15s;
    }
    .btn-link:hover { color: #0c3040; }

    /* ── Reset inline box ── */
    .inline-box {
      display: none;
      margin-top: 12px;
      padding: 14px;
      background: #f8f6f2;
      border-left: 3px solid #d4d0c8;
    }
    .inline-box .field-input { font-size: 13px; }

    /* ── Card footer (brand strip) ── */
    .card-footer {
      height: 3px;
      background: linear-gradient(90deg, #0c3040 0%, #D8EF00 100%);
    }

    /* ── Below-card decoration ── */
    .below-deco {
      display: flex;
      justify-content: flex-end;
      padding: 10px 4px 0;
    }
    .below-deco-dots {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 5px;
      opacity: 0.2;
    }
    .below-deco-dots span {
      font-size: 12px;
      font-weight: 300;
      color: #0c3040;
      line-height: 1;
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      body { padding: 1rem; }
      .card-header, .tabs, .card-body { padding-left: 1.5rem; padding-right: 1.5rem; }
    }
  </style>
</head>
<body>

  <div id="fatalErrorBox" style="position:fixed;top:1rem;left:1rem;right:1rem;z-index:300;"></div>

  <div class="page">

    <!-- Card -->
    <div class="card">

      <!-- Header -->
      <div class="card-header">
        <div class="logo-mark">
          <div class="logo-text">
            <span class="g">Guardanap</span><span class="on">ON</span>
          </div>
          <div class="logo-sub">Gestão de repertório</div>
        </div>
        <div class="corner-dots">
          <span>+</span><span>+</span><span>+</span>
          <span>+</span><span>+</span><span>+</span>
          <span>+</span><span>+</span><span>+</span>
        </div>
      </div>

      <!-- Tabs -->
      <div class="tabs">
        <button class="tab-btn auth-tab-btn active" data-auth-tab="entrar">Entrar</button>
        <button class="tab-btn auth-tab-btn" data-auth-tab="cadastrar">Cadastrar</button>
      </div>

      <!-- Body -->
      <div class="card-body">

        <!-- PANEL: Entrar -->
        <div class="auth-panel active" id="painelEntrar">

          <div class="field">
            <label class="field-label">Usuário</label>
            <input id="loginUsuario" type="text" autocomplete="username"
              class="field-input" placeholder="seu_usuario"/>
            <div id="erroLoginUsuario" class="field-error"></div>
          </div>

          <div class="field">
            <label class="field-label">Senha</label>
            <input id="loginSenha" type="password" autocomplete="current-password"
              class="field-input" placeholder="••••••••"/>
            <div id="erroLoginSenha" class="field-error"></div>
          </div>

          <div id="erroLoginForm" class="form-error"></div>

          <button id="btnEntrar" class="btn-cta">Entrar no Painel</button>

          <div class="secondary">
            <button id="btnGoogleLogin" class="btn-link">
              <svg width="11" height="11" viewBox="0 0 24 24">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
              </svg>
              Entrar com Google
            </button>
            <button id="btnMostrarReset" class="btn-link">Esqueci a senha</button>
          </div>

          <div id="resetBox" class="inline-box">
            <input id="resetUsuarioEmail" type="text" class="field-input"
              style="font-size:13px;" placeholder="Usuário ou e-mail"/>
            <div id="erroResetForm" class="field-error"></div>
            <button id="btnResetSenha" class="btn-link" style="margin-top:10px;color:#0c3040;">
              Enviar link de redefinição →
            </button>
          </div>

        </div>

        <!-- PANEL: Cadastrar -->
        <div class="auth-panel" id="painelCadastrar">

          <div class="field">
            <label class="field-label">Usuário</label>
            <input id="cadastroUsuario" type="text" autocomplete="username"
              class="field-input" placeholder="seu_usuario"/>
            <div id="erroCadastroUsuario" class="field-error"></div>
          </div>

          <div class="field">
            <label class="field-label">Senha</label>
            <input id="cadastroSenha" type="password" autocomplete="new-password"
              class="field-input" placeholder="mínimo 6 caracteres"/>
            <div id="erroCadastroSenha" class="field-error"></div>
          </div>

          <div id="erroCadastroForm" class="form-error"></div>

          <button id="btnCadastrar" class="btn-cta">Criar Conta</button>

        </div>

        <!-- Update Password -->
        <div id="updatePasswordBox" class="inline-box" style="margin-top:1rem;">
          <p class="field-label" style="margin-bottom:10px;">Defina uma nova senha</p>
          <input id="novaSenha" type="password" class="field-input"
            style="font-size:13px;" placeholder="Mínimo 6 caracteres"/>
          <div id="erroNovaSenha" class="field-error"></div>
          <div id="erroSalvarSenha" class="field-error"></div>
          <button id="btnSalvarNovaSenha" class="btn-cta" style="margin-top:12px;">Salvar Senha</button>
        </div>

      </div>

      <!-- Footer gradient strip -->
      <div class="card-footer"></div>
    </div>

    <!-- Below decoration -->
    <div class="below-deco">
      <div class="below-deco-dots">
        <span>+</span><span>+</span><span>+</span><span>+</span>
        <span>+</span><span>+</span><span>+</span><span>+</span>
      </div>
    </div>

  </div>

  <button id="themeToggle" style="display:none;position:absolute;"></button>
  <div id="toastWrap"></div>
  <div id="loadingOverlay">
    <div class="loading-card">
      <div class="spinner"></div>
      <div id="loadingTitle" class="loading-title">Carregando</div>
      <div id="loadingSub" class="loading-sub">Só um instante.</div>
    </div>
  </div>

  <script src="./js/config.js"></script>
  <script src="./js/supabase-lite.js"></script>
  <script src="./js/common.js"></script>
  <script src="./js/auth.js"></script>
</body>
</html>
