<!DOCTYPE html>
<html class="light" lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GuardanapON — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;900&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="./css/tailwind.css"/>
  <link rel="stylesheet" href="./css/stitch.css"/>
  <style>
    body {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Space Grotesk", sans-serif;
      padding: 1rem;
      overflow-x: hidden;
      /* Bar table atmosphere: warm dark with radial spotlight where the napkin sits */
      background-color: #12100d;
      background-image:
        radial-gradient(ellipse 70% 60% at 50% 48%, #2a2318 0%, #16120e 45%, #0d0b08 100%),
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 2px,
          rgba(255,240,200,0.012) 2px,
          rgba(255,240,200,0.012) 3px
        );
    }
  </style>
</head>
<body>

  <!-- Fatal error -->
  <div id="fatalErrorBox" style="position:fixed;top:1rem;left:1rem;right:1rem;z-index:300;"></div>

  <!-- Main Napkin — square like a paper napkin -->
  <main class="relative w-full max-w-[420px] shadow-[0_20px_48px_rgba(0,0,0,0.6)] rotate-[-0.8deg] hover:rotate-0 transition-transform duration-500 z-10">

    <!-- Gofrado texture -->
    <div class="absolute inset-0 bg-surface gofrado-pattern pointer-events-none"></div>

    <!-- Napkin core -->
    <div class="relative bg-surface p-6 flex flex-col gap-4 h-full">

      <!-- Paperclip decoration -->
      <span class="material-symbols-outlined absolute -top-3 right-8 text-[#acadad] text-4xl rotate-45 pointer-events-none z-20" style="font-variation-settings:'FILL' 0,'wght' 300,'GRAD' 0,'opsz' 24">attach_file</span>

      <!-- Header -->
      <div class="text-center pt-1">
        <div class="inline-block relative">
          <h1 class="text-3xl font-black text-[#0c0f0f] uppercase tracking-tighter font-body">GuardanapON</h1>
          <div class="absolute -bottom-1 left-0 w-full h-2.5 bg-[#D8EF00] -z-10 rotate-[-0.5deg]"></div>
        </div>
      </div>

      <!-- Tabs -->
      <div class="flex border border-outline-variant">
        <button class="auth-tab-btn active flex-1" data-auth-tab="entrar">Entrar</button>
        <button class="auth-tab-btn flex-1 border-l border-outline-variant" data-auth-tab="cadastrar">Cadastrar</button>
      </div>

      <!-- ── PANEL: Entrar ── -->
      <div class="auth-panel active" id="painelEntrar">
        <div class="space-y-3">
          <div>
            <label class="block text-[9px] font-bold uppercase tracking-widest text-primary mb-1">Usuário</label>
            <input id="loginUsuario" type="text" autocomplete="username"
              class="handwritten-input w-full bg-transparent border-0 border-b-2 border-[#0c0f0f] focus:ring-0 focus:border-[#D8EF00] px-0 py-1.5 text-on-surface font-medium text-base transition-colors"
              placeholder="seu_usuario"/>
            <div id="erroLoginUsuario" class="text-[#b02500] text-[10px] font-bold min-h-[14px]"></div>
          </div>
          <div>
            <label class="block text-[9px] font-bold uppercase tracking-widest text-primary mb-1">Senha</label>
            <input id="loginSenha" type="password" autocomplete="current-password"
              class="w-full bg-transparent border-0 border-b-2 border-[#0c0f0f] focus:ring-0 focus:border-[#D8EF00] px-0 py-1.5 text-on-surface font-medium text-base transition-colors"
              placeholder="••••••••"/>
            <div id="erroLoginSenha" class="text-[#b02500] text-[10px] font-bold min-h-[14px]"></div>
          </div>

          <div id="erroLoginForm" class="text-[#b02500] text-xs font-bold min-h-[16px]"></div>

          <button id="btnEntrar"
            class="w-full bg-[#D8EF00] py-3 text-primary font-black uppercase tracking-[0.2em] text-xs hover:brightness-105 active:scale-[0.98] transition-all shadow-[4px_4px_0px_#576100]">
            Entrar no Painel
          </button>
        </div>

        <!-- Secondary actions — compact row -->
        <div class="flex items-center justify-between pt-2 border-t border-dashed border-outline-variant/40 mt-2">
          <button id="btnGoogleLogin"
            class="flex items-center gap-1.5 text-[9px] font-bold uppercase tracking-wide text-outline hover:text-primary transition-colors">
            <svg width="12" height="12" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
            Google
          </button>
          <button id="btnMostrarReset"
            class="text-[9px] font-bold uppercase tracking-wide text-outline hover:text-primary transition-colors">
            Esqueci a senha
          </button>
        </div>

        <!-- Reset box (hidden by default) -->
        <div id="resetBox" style="display:none;" class="border border-dashed border-outline-variant p-3 space-y-2 mt-2">
          <input id="resetUsuarioEmail" type="text"
            class="w-full bg-transparent border-0 border-b border-outline px-0 py-1.5 text-on-surface font-medium text-sm focus:ring-0 focus:border-primary transition-colors"
            placeholder="Usuário ou email"/>
          <div id="erroResetForm" class="text-[#b02500] text-[10px] font-bold min-h-[14px]"></div>
          <button id="btnResetSenha"
            class="text-[9px] font-black uppercase tracking-widest text-primary hover:underline decoration-[#D8EF00]">
            Enviar link →
          </button>
        </div>
      </div>

      <!-- ── PANEL: Cadastrar ── -->
      <div class="auth-panel" id="painelCadastrar">
        <div class="space-y-3">
          <div>
            <label class="block text-[9px] font-bold uppercase tracking-widest text-primary mb-1">Usuário</label>
            <input id="cadastroUsuario" type="text" autocomplete="username"
              class="handwritten-input w-full bg-transparent border-0 border-b-2 border-[#0c0f0f] focus:ring-0 focus:border-[#D8EF00] px-0 py-1.5 text-on-surface font-medium text-base transition-colors"
              placeholder="seu_usuario"/>
            <div id="erroCadastroUsuario" class="text-[#b02500] text-[10px] font-bold min-h-[14px]"></div>
          </div>
          <div>
            <label class="block text-[9px] font-bold uppercase tracking-widest text-primary mb-1">Senha</label>
            <input id="cadastroSenha" type="password" autocomplete="new-password"
              class="w-full bg-transparent border-0 border-b-2 border-[#0c0f0f] focus:ring-0 focus:border-[#D8EF00] px-0 py-1.5 text-on-surface font-medium text-base transition-colors"
              placeholder="mínimo 6 caracteres"/>
            <div id="erroCadastroSenha" class="text-[#b02500] text-[10px] font-bold min-h-[14px]"></div>
          </div>

          <div id="erroCadastroForm" class="text-[#b02500] text-xs font-bold min-h-[16px]"></div>

          <button id="btnCadastrar"
            class="w-full bg-[#D8EF00] py-3 text-primary font-black uppercase tracking-[0.2em] text-xs hover:brightness-105 active:scale-[0.98] transition-all shadow-[4px_4px_0px_#576100]">
            Cadastrar e Continuar
          </button>
        </div>
      </div>

      <!-- ── Update Password Box (force-reset) ── -->
      <div id="updatePasswordBox" style="display:none;" class="border border-dashed border-outline-variant p-4 space-y-3">
        <p class="text-[9px] font-bold uppercase tracking-widest text-primary">Nova senha</p>
        <input id="novaSenha" type="password"
          class="w-full bg-transparent border-0 border-b border-outline px-0 py-1.5 text-on-surface font-medium text-sm focus:ring-0 focus:border-primary transition-colors"
          placeholder="Mínimo 6 caracteres"/>
        <div id="erroNovaSenha" class="text-[#b02500] text-[10px] font-bold min-h-[14px]"></div>
        <div id="erroSalvarSenha" class="text-[10px] font-bold min-h-[14px]"></div>
        <button id="btnSalvarNovaSenha"
          class="bg-[#D8EF00] px-5 py-2 text-primary font-black uppercase tracking-widest text-[9px] shadow-[3px_3px_0px_#576100] hover:brightness-105 active:scale-95 transition-all">
          Salvar →
        </button>
      </div>

    </div>
  </main>

  <!-- Hidden theme toggle (required by common.js/auth.js) -->
  <button id="themeToggle" style="display:none;position:absolute;"></button>

  <!-- Toast & Loading -->
  <div id="toastWrap"></div>
  <div id="loadingOverlay">
    <div class="loading-card">
      <div class="spinner"></div>
      <div id="loadingTitle" class="loading-title">Carregando</div>
      <div id="loadingSub" class="loading-sub">Só um instante.</div>
    </div>
  </div>

  <script src="./js/config.js"></script>
  <script src="./js/supabase-lite.js"></script>
  <script src="./js/common.js"></script>
  <script src="./js/auth.js"></script>
</body>
</html>
